name: cleanup
on:
  push:
    branches: [fix/cleanup]
  #schedule:
    #- cron: "0 3 * * *"

jobs:
  cleanup:
    name: cleanup
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: werf/actions/install@v2

      - name: werf cleanup
        shell: bash
        env:
          WERF_KUBECONFIG_BASE64: ${{ secrets.WERF_KUBECONFIG_BASE64 }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          WERF_REPO_GITHUB_TOKEN: ${{ secrets.REGISTRY_CLEANUP_TOKEN }}
        run: |
          source "$(werf ci-env github --as-file)"
          werf cleanup
