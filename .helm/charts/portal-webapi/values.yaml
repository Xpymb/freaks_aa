environment: "Staging"
replicaCount: 1

service:
  name: "portal-webapi"
  portHttp: 8080
ingress:
  enabled: true
  host: api.freaks-aa.ru
auth:
  issuer: "https://auth.freaks-aa.ru/realms/freaks-dev"
  clientId: "portal-backend"
kcAdmin:
  realm: "freaks-dev"
  authServerUrl: "https://auth.freaks-aa.ru"
  sslRequired: "external"
  resource: "realm_admin"
  verifyTokenAudience: "true"
  confidentialPort: "0"
redis:
  host: "redis-master.freaks.svc.cluster.local"
  port: "6379"
  database: "0"
  connectTimeout: "60000"
  syncTimeout: "60000"
centifugo:
  url: "http://centrifugo.freaks.svc.cluster.local:9000/api"
limits:
  memoryRequests: "200Mi"
  memoryLimits: "512Mi"
  cpuRequests: "100m"
  cpuLimits: "500m"
