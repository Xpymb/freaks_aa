apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: frontend-ingress-rewrite
  annotations:
    kubernetes.io/ingress.class: "nginx"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-buffer-size: {{ .Values.ingress.proxyBufferSize | default "16k" | quote }}
    nginx.ingress.kubernetes.io/proxy-buffers-number: {{ .Values.ingress.proxyBuffersNumber | default "8" | quote }}
    nginx.ingress.kubernetes.io/proxy-busy-buffers-size: {{ .Values.ingress.proxyBusyBuffersSize | default "64k" | quote }}
    nginx.ingress.kubernetes.io/client-header-buffer-size: {{ .Values.ingress.clientHeaderBufferSize | default "32k" | quote }}
    nginx.ingress.kubernetes.io/large-client-header-buffers: {{ .Values.ingress.largeClientHeaderBuffers | default "4 32k" | quote }}
spec:
  tls:
    - hosts:
        - {{ .Values.ingress.host | quote }}
      secretName: freaks-aa-frontend-tls
  rules:
    - host: {{ .Values.ingress.host | quote }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ .Values.service.name }}
                port:
                  number: {{ .Values.service.portHttp }}
