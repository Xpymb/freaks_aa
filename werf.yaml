configVersion: 1
project: freaks
---
image: solution-build-artifacts
dockerfile: Dockerfile
context: ./src/backend/dotnet
args: { DOTNET_SDK_VERSION: "9.0-alpine3.22" }
---
image: portal-webapi
dockerfile: Dockerfile
context: ./docker/dotnet/PortalService
args: { ASPNET_VERSION: "9.0-alpine3.22" }
dependencies:
  - image: solution-build-artifacts
    imports:
      - type: ImageName
        targetBuildArg: SOLUTION_IMAGE_NAME
---
image: files-webapi
dockerfile: Dockerfile
context: ./docker/dotnet/FileService
args: { ASPNET_VERSION: "9.0-alpine3.22" }
dependencies:
  - image: solution-build-artifacts
    imports:
      - type: ImageName
        targetBuildArg: SOLUTION_IMAGE_NAME
---
image: users-migrations
dockerfile: Migrations/Users/Dockerfile
context: ./src/backend/dotnet
args: { DOTNET_SDK_VERSION: "9.0-alpine3.22" }
---
image: portal-webapi-migrations
dockerfile: Migrations/Portal/Dockerfile
context: ./src/backend/dotnet
args: { DOTNET_SDK_VERSION: "9.0-alpine3.22" }
